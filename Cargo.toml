[package]
name = "ontologizer"
version = "0.1.1"
keywords = ["Ontologizer", "Gene_Ontology"]
description = "todo"
edition = "2024"
license = "MIT"
readme = "README.md"

[lib]
name = "ontologizer"
path = "src/lib.rs"

[[bin]]
name = "onto"
path = "bin/main.rs"
required-features = ["cli"]

[features]
default = ["cli"]
cli = ["clap"]  # Enable clap when the CLI feature is enabled

[dependencies]
serde = { version = "1.0", features = ["derive"] }
ontolius = "0.5.4"
clap = { version = "4.5.47", features = ["derive"], optional = true }
float_eq = "1.0.1"
oboannotation = { git = "https://github.com/P2GX/oboannotation.git", tag = "v0.1.2" }
indexmap = "2.11.3"
rand = "0.10.0-rc.0"
csv = "1.4.0"

[dev-dependencies]
rstest = "0.26.1"



